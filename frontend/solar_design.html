<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ORBIT - AI Solar System</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --space-black:#050816; --midnight-blue:#0F172A; --cosmic-purple:#7C3AED;
  --electric-blue:#3B82F6; --cyan:#06B6D4; --golden-glow:#F59E0B;
  --glass-border: 1px solid rgba(124,58,237,0.18);
}
* { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior:smooth; scrollbar-width:thin; scrollbar-color: rgba(124,108,240,0.35) transparent; }
*::-webkit-scrollbar { width:8px; height:8px; }
*::-webkit-scrollbar-track { background:transparent; }
*::-webkit-scrollbar-thumb { background: rgba(124,108,240,0.35); border-radius:999px; }
*::-webkit-scrollbar-thumb:hover { background: rgba(124,108,240,0.55); }
body {
  font-family:'Inter',sans-serif; background:var(--space-black); color:#fff;
  min-height:100vh; overflow-x:hidden; position:relative; padding-bottom:110px;
}
.stars {
  position:fixed; inset:0; z-index:-1;
  background-image: radial-gradient(1px 1px at 20px 30px, #fff, transparent),
    radial-gradient(1px 1px at 90px 80px, #fff, transparent),
    radial-gradient(1px 1px at 150px 40px, #fff, transparent),
    radial-gradient(1px 1px at 200px 120px, #fff, transparent),
    radial-gradient(1px 1px at 60px 160px, #fff, transparent);
  background-size:220px 200px; animation:twinkle 6s infinite ease-in-out;
}
@keyframes twinkle { 0%,100%{opacity:.5} 50%{opacity:1} }
header { display:flex; justify-content:space-between; align-items:center; padding:24px 20px 0; }
.logo { font-size:1.5rem; font-weight:800; letter-spacing:1px;
  background:linear-gradient(135deg,var(--electric-blue),var(--cosmic-purple));
  -webkit-background-clip:text; background-clip:text; color:transparent; }
.status-dot { width:10px; height:10px; border-radius:50%; background:#22c55e; box-shadow:0 0 10px #22c55e; }

.solar-stage { position:relative; width:100%; height:380px; margin:10px 0 30px; }
.orbit-path { position:absolute; top:50%; left:50%; border-radius:50%; transform:translate(-50%,-50%); border:1px dashed rgba(124,58,237,0.15); }
.orbit-path.inner { width:200px; height:200px; }
.orbit-path.outer { width:300px; height:300px; }

.ai-core {
  position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
  width:96px; height:96px; border-radius:50%;
  background: radial-gradient(circle at 35% 30%, #fff, var(--golden-glow) 40%, var(--cosmic-purple) 100%);
  box-shadow:0 0 60px 20px rgba(245,158,11,0.35), 0 0 120px 40px rgba(124,58,237,0.25);
  animation: pulse 4s infinite ease-in-out; z-index:5;
}
@keyframes pulse { 0%,100%{transform:translate(-50%,-50%) scale(1)} 50%{transform:translate(-50%,-50%) scale(1.08)} }

.feature-card {
  position:absolute; top:50%; left:50%; width:62px; height:62px;
  border-radius:18px; background:rgba(15,23,42,0.7); backdrop-filter:blur(20px);
  border:var(--glass-border); box-shadow:0 8px 25px rgba(0,0,0,0.35);
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:4px;
  cursor:pointer; transition:box-shadow .2s ease, background .2s ease;
}
.feature-card:hover { background:rgba(30,41,59,0.85); box-shadow:0 12px 32px rgba(124,58,237,0.35); }
.feature-card .fc-inner { display:flex; flex-direction:column; align-items:center; gap:4px; animation: bob 6s infinite ease-in-out; }
.feature-card:nth-child(odd) .fc-inner { animation-delay:-3s; }
@keyframes bob { 0%,100%{ transform:translateY(0); } 50%{ transform:translateY(-5px); } }
.feature-card svg { width:20px; height:20px; stroke:#fff; fill:none; stroke-width:1.8; }
.feature-card span { font-size:9px; color:rgba(255,255,255,0.85); font-weight:500; }

/* outer ring r=150, inner ring r=100 */
.fc-chat       { transform: translate(-50%,-50%) translate(150px, 0px); }
.fc-voice      { transform: translate(-50%,-50%) translate(0px, 150px); }
.fc-translate  { transform: translate(-50%,-50%) translate(-150px, 0px); }
.fc-documents  { transform: translate(-50%,-50%) translate(0px, -150px); }
.fc-vision     { transform: translate(-50%,-50%) translate(70px, 70px); }
.fc-code       { transform: translate(-50%,-50%) translate(-70px, 70px); }
.fc-research   { transform: translate(-50%,-50%) translate(-70px, -70px); }
.fc-images     { transform: translate(-50%,-50%) translate(70px, -70px); }

.section { padding:0 20px; margin-bottom:24px; }
.section-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:14px; }
.section-header h2 { font-size:1rem; font-weight:700; }
.section-header a { font-size:0.8rem; color:var(--cyan); text-decoration:none; }
.activity-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
.activity-card { background:rgba(15,23,42,0.6); border:var(--glass-border); border-radius:16px; padding:16px; backdrop-filter:blur(16px); }
.activity-card .dot { width:34px; height:34px; border-radius:50%; background:linear-gradient(135deg,var(--electric-blue),var(--cosmic-purple)); margin-bottom:10px; }
.activity-card h4 { font-size:0.85rem; margin-bottom:4px; }
.activity-card p { font-size:0.7rem; color:rgba(255,255,255,0.5); }
.progress { height:4px; border-radius:2px; background:rgba(255,255,255,0.1); margin-top:10px; overflow:hidden; }
.progress div { height:100%; background:linear-gradient(90deg,var(--electric-blue),var(--cosmic-purple)); }

.nav-dock {
  position:fixed; bottom:20px; left:50%; transform:translateX(-50%);
  width:90%; max-width:420px; padding:12px 18px; border-radius:30px;
  background:rgba(15,23,42,0.85); backdrop-filter:blur(30px);
  border:var(--glass-border); box-shadow:0 10px 40px rgba(0,0,0,0.5);
  display:flex; justify-content:space-between; align-items:center; z-index:100;
}
.nav-item { display:flex; flex-direction:column; align-items:center; gap:4px; color:rgba(255,255,255,0.5); cursor:pointer; }
.nav-item.active { color:var(--electric-blue); }
.nav-item svg { width:20px; height:20px; stroke:currentColor; fill:none; stroke-width:1.8; }
.nav-item span { font-size:10px; }
.nav-core { width:46px; height:46px; border-radius:50%; background:linear-gradient(135deg,var(--electric-blue),var(--cosmic-purple)); display:flex; align-items:center; justify-content:center; box-shadow:0 0 20px rgba(124,58,237,0.5); }
.nav-core svg { width:20px; height:20px; stroke:#fff; }
</style>
</head>
<body>
<div class="stars"></div>
<header>
  <div class="logo">ORBIT</div>
  <div class="status-dot"></div>
</header>

<div class="solar-stage">
  <div class="orbit-path inner"></div>
  <div class="orbit-path outer"></div>
  <div class="ai-core"></div>

  <div class="feature-card fc-chat"><div class="fc-inner">
    <svg viewBox="0 0 24 24"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>
    <span>Chat</span></div></div>

  <div class="feature-card fc-vision"><div class="fc-inner">
    <svg viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
    <span>Vision</span></div></div>

  <div class="feature-card fc-code"><div class="fc-inner">
    <svg viewBox="0 0 24 24"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
    <span>Code</span></div></div>

  <div class="feature-card fc-research"><div class="fc-inner">
    <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <span>Research</span></div></div>

  <div class="feature-card fc-images"><div class="fc-inner">
    <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
    <span>Images</span></div></div>

  <div class="feature-card fc-documents"><div class="fc-inner">
    <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
    <span>Documents</span></div></div>

  <div class="feature-card fc-voice"><div class="fc-inner">
    <svg viewBox="0 0 24 24"><rect x="9" y="2" width="6" height="12" rx="3"/><path d="M5 10v1a7 7 0 0 0 14 0v-1"/><line x1="12" y1="19" x2="12" y2="23"/></svg>
    <span>Voice</span></div></div>

  <div class="feature-card fc-translate"><div class="fc-inner">
    <svg viewBox="0 0 24 24"><path d="M5 8h7M9 5v3a8 8 0 0 1-6 7.5M5 18l4-9 4 9M6.5 15h5"/><path d="M14 19l3-7 3 7M14.5 17h5"/></svg>
    <span>Translate</span></div></div>
</div>

<div class="section">
  <div class="section-header"><h2>Recent Activity</h2><a href="#">View All</a></div>
  <div class="activity-grid">
    <div class="activity-card"><div class="dot"></div><h4>Solar System Exploration</h4><p>2h ago</p><div class="progress"><div style="width:65%"></div></div></div>
    <div class="activity-card"><div class="dot"></div><h4>Galaxy Mapping</h4><p>5h ago</p><div class="progress"><div style="width:35%"></div></div></div>
  </div>
</div>

<div class="nav-dock">
  <div class="nav-item active"><svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg><span>Home</span></div>
  <div class="nav-item"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg><span>Explore</span></div>
  <div class="nav-core"><svg viewBox="0 0 24 24"><path d="M12 2l1.5 4.5L18 8l-4.5 1.5L12 14l-1.5-4.5L6 8l4.5-1.5z"/></svg></div>
  <div class="nav-item"><svg viewBox="0 0 24 24"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg><span>Messages</span></div>
  <div class="nav-item"><svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 21v-1a8 8 0 0 1 16 0v1"/></svg><span>Profile</span></div>
</div>
</body>
</html>
